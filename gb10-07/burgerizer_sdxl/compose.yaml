services:
  burgerizer_sdxl:
    build: .
    image: burgerizer_sdxl:latest
    container_name: burgerizer_sdxl
    environment:
      # Disable torch.compile/inductor - Triton doesn't support Blackwell sm_121a yet
      TORCH_COMPILE_DISABLE: "1"
      TORCHDYNAMO_DISABLE: "1"

      # Grace-Blackwell unified memory optimizations
      CUDA_CACHE_DISABLE: "1"
      #PYTORCH_NO_CUDA_MEMORY_CACHING: "1"
      #CUDA_DEVICE_MAX_CONNECTIONS: "1"
      CUDA_DEVICE_MAX_COPY_CONNECTIONS: "4"
      CUDA_MODULE_LOADING: "EAGER"
      #CUDA_MANAGED_FORCE_DEVICE_ALLOC: "1"
      OMP_NUM_THREADS: "20"
      #CUBLAS_WORKSPACE_CONFIG: ":0:0"
      PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True" # Enable PyTorch's new expandable memory segments to better handle memory fragmentation.
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      - ~/.cache/huggingface:/root/.cache/huggingface
      - ./accelerate_config.yaml:/opt/sd-scripts/accelerate_config.yaml
      - ./bb_multi_dataset.toml:/opt/sd-scripts/dataset.toml
      - ~/gb10/images/bb_crop:/input
      - ~/gb10/output_models/bb_multi:/output
    ports:
      - "6006:6006"
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: 16gb
    stdin_open: true
    tty: true
    command: >
      accelerate launch --config_file accelerate_config.yaml --num_cpu_threads_per_process=12 sdxl_train_network.py 
        --pretrained_model_name_or_path="stabilityai/stable-diffusion-xl-base-1.0" 
        --dataset_config="dataset.toml" 
        --logging_dir="/output/logs" 
        --output_dir="/output" 
        --output_name="burgerizer_v1" 
        --persistent_data_loader_workers
        --max_data_loader_n_workers=8
        --save_every_n_steps=200 
        --save_model_as=safetensors 
        --max_train_steps=4000 
        --learning_rate=1.0 
        --optimizer_type="Prodigy" 
        --optimizer_args "weight_decay=0.01" "decouple=True" "use_bias_correction=True" 
        --lr_scheduler="constant" 
        --network_module=networks.lora 
        --network_dim=128 
        --network_alpha=64 
        --mixed_precision="bf16" 
        --full_bf16 
        --no_half_vae 
        --mem_eff_attn
        --highvram
        --network_train_unet_only
        --min_snr_gamma=5
        --caption_dropout_rate=0.05
        --cache_latents
        --cache_latents_to_disk
