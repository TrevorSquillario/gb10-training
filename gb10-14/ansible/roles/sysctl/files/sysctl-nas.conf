# Enable packet forwarding for IPv4
net.ipv4.ip_forward=1
net.ipv6.conf.all.forwarding = 1

# Decrease swap usage
vm.swappiness=1

# Enable intel gpu stats. Default is disable unprivileged perf events: 4
kernel.perf_event_paranoid=2

# Samba Performance Tuning
net.core.rmem_max = 67108864 # 64MB
net.core.wmem_max = 67108864 # 64MB
net.ipv4.tcp_rmem = 4096 87380 33554432 # 32 MB
net.ipv4.tcp_wmem = 4096 65536 33554432 # 32 MB
net.ipv4.tcp_tw_reuse = 1