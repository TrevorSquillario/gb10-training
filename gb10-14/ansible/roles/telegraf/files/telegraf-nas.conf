[agent]
  interval = "5m"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  collection_jitter = "0s"
  flush_interval = "1m"
  flush_jitter = "0s"
  precision = ""
  hostname = ""
  omit_hostname = false
  ## Log at debug level.
  #debug = true
  logtarget = "file"
  logfile = "/var/log/telegraf/telegraf.log"

[[inputs.net]]
  interfaces = ["en*"]

#[[inputs.dns_query]]
#  servers = ["8.8.8.8", "1.1.1.1",]

[[inputs.cpu]]
  percpu = true
  totalcpu = true
  collect_cpu_time = false
  report_active = false

[[inputs.disk]]
  ignore_fs = ["tmpfs", "devtmpfs", "devfs", "iso9660", "overlay", "aufs", "squashfs"]
  mount_points = ["/", "/app", "/data", "/data02", "/cctv01"]

[[inputs.lvm]]
  use_sudo = true

# Read metrics about disk IO by device
[[inputs.diskio]]

[[inputs.smartctl]]
  interval = "1h"
  path = "/usr/sbin/smartctl"
  use_sudo = true
  # attributes = true
  # devices_include = []
  # devices_exclude = []
  # timeout = "30s"

# Get kernel statistics from /proc/stat
[[inputs.kernel]]

# Read metrics about memory usage
[[inputs.mem]]

# Get the number of processes and group them by status
[[inputs.processes]]

# Read metrics about swap memory usage
[[inputs.swap]]

# Read metrics about system load & uptime
[[inputs.system]]

# Get kernel statistics from /proc/vmstat
[[inputs.kernel_vmstat]]

[[inputs.temp]]

[[inputs.docker]]
  endpoint = "unix:///var/run/docker.sock"
  gather_services = false
  source_tag = false
  container_name_include = []
  container_name_exclude = []
  timeout = "5s"
  #perdevice = false
  #total = true
  total_include = ["cpu", "blkio", "network"]
  docker_label_include = []
  docker_label_exclude = []
  tag_env = ["JAVA_HOME", "HEAP_SIZE"]

[[inputs.influxdb]]
  urls = [
    "http://localhost:8086/debug/vars"
  ]
  username = "trevor"
  password = "P@ssw0rd!"
  timeout = "5s"

[[inputs.filestat]]
  ## Files to gather stats about.
  ## These accept standard unix glob matching rules, but with the addition of
  ## ** as a "super asterisk". See https://github.com/gobwas/glob.
  files = ["/app/ha/home-assistant_v2.db"]
  ## If true, read the entire file and calculate an md5 checksum.
  md5 = false

[[inputs.filecount]]
  directories = ["/data/ha/backups", "/data/ha/snapshots"]
  recursive = true

[[inputs.exec]]
  commands = [ "/app/scripts/iostat.sh" ]
  name_override = "iostat"
  timeout = "10s"
  data_format = "json"
  json_string_fields = ["r/s","w/s","d/s","f/s" ,"rkB/s","wkB/s","dkB/s","rrqm/s","wrqm/s","drqm/s","rrqm","wrqm","drqm","r_await","w_await","d_await","f_await","rareq-sz","wareq-sz","dareq-sz","aqu-sz","util"]
  tag_keys = ["disk_device"]

[[inputs.exec]]
  commands = ["/app/scripts/zfs-health-check.py"]
  name_override = "zfs-health"
  data_format = "json"
  timeout = "10s"
  json_string_fields = ["SIZE", "ALLOC", "FREE", "FRAG", "CAP", "DEDUP", "HEALTH"]
  tag_keys = ["NAME"]

[[inputs.exec]]
  commands = ["/app/scripts/lsi-hba-temp-stats.py"]
  name_override = "lsi-hba-temp"
  data_format = "json"
  timeout = "10s"
  json_string_fields = ["attribute", "value"]
  tag_keys = ["controller"]

# [[inputs.exec]]
#   commands = ["/app/scripts/zfs-iostat.py"]
#   name_override = "zfs-iostat"
#   data_format = "json"
#   timeout = "10s"
#   json_string_fields = ["pool","capacity_alloc","capacity_free","operations_read","operations_write","bandwidth_read","bandwidth_write","total_wait_read","total_wait_write","disk_wait_read","disk_wait_write","syncq_wait_read","syncq_wait_write","asyncq_wait_read","asyncq_wait_write","scrub_wait","trim_wait"]
#   tag_keys = ["pool"]

#[[inputs.zfs]]

[[inputs.exec]]        
  commands = ["/usr/lib/zfs-linux/zpool_influxdb"]     
  data_format = "influx"  

[[inputs.exec]]
  commands = ["/app/scripts/jellyfin-stats.py"]
  name_override = "jellyfin-stats"
  data_format = "json"
  timeout = "10s"
  json_string_fields = ["BitRate", "Client", "Codec", "DeviceName", "DisplayTitle", "Height", "Name", "RemoteEndPoint", "Transcoding", "TranscodingBitrate", "TranscodingHardwareAccelerationType", "TranscodingHeight", "TranscodingReasons", "TranscodingWidth", "UserName", "VideoRange", "Width"]
  tag_keys = ["UserName", "Path"]

[[inputs.exec]]
  name_override = "intel-gpu"
  commands = ["/app/scripts/intel_gpu_top.sh"]
  json_query = "[:1]"
  timeout = "3s"
  data_format = "json"
  json_strict = false

[[outputs.influxdb]]
  urls = ["http://127.0.0.1:8086"]
  username = "trevor"
  password = "P@ssw0rd!"
  database = "docker"
  skip_database_creation = false

